apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
spec:
  replicas: {{ .Values.chat.replicaCount }}
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
      - name: chat
        image: "{{ .Values.chat.image.repository }}:{{ .Values.chat.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: RISK_API_URL
          value: "http://risk-api:{{ .Values.riskApi.service.port }}"
        volumeMounts:
        - name: chat-data
          mountPath: /data
        resources:
          requests:
            cpu: "{{ .Values.chat.resources.requests.cpu }}"
            memory: "{{ .Values.chat.resources.requests.memory }}"
          limits:
            cpu: "{{ .Values.chat.resources.limits.cpu }}"
            memory: "{{ .Values.chat.resources.limits.memory }}"
      volumes:
      - name: chat-data
        persistentVolumeClaim:
          claimName: chat-pvc
