chat:
  replicaCount: 1
  image:
    repository: docker.io/acme/chat
    tag: latest
  service:
    type: ClusterIP
    port: 8080

riskApi:
  replicaCount: 1
  image:
    repository: docker.io/acme/risk-api
    tag: v3
  service:
    type: ClusterIP
    port: 8000

persistence:
  size: 1Gi

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

persistence:
  size: 1Gi
