chat:
  replicaCount: 1
  image:
    repository: eyesoncloud/chat-api
    tag: dev
  service:
    type: NodePort
    port: 8000
  env:
    APP_ENV: dev
    BOT_NAME: BankBot
    SYSTEM_PROMPT: "You are a banking support assistant."
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

riskApi:
  replicaCount: 1
  image:
    repository: eyesoncloud/risk-api
    tag: dev
  service:
    type: ClusterIP
    port: 8001
  env:
    APP_ENV: dev
    MODEL_NAME: RiskModel
    RISK_THRESHOLD: "0.6"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

persistence:
  storageClass: nfs-client
  size: 1Gi
