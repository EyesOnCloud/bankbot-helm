apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
spec:
  replicas: {{ .Values.chat.replicaCount }}
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
      - name: chat
        image: "{{ .Values.chat.image.repository }}:{{ .Values.chat.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.chat.service.port }}
        env:
        - name: APP_ENV
          value: "{{ .Values.chat.env.APP_ENV }}"
        - name: BOT_NAME
          value: "{{ .Values.chat.env.BOT_NAME }}"
        - name: SYSTEM_PROMPT
          value: "{{ .Values.chat.env.SYSTEM_PROMPT }}"
        - name: RISK_API_URL
          value: "http://risk-api:{{ .Values.riskApi.service.port }}"
        - name: MODEL_DIR
          value: "/model"
        - name: LOG_DIR
          value: "/shared/logs"
        volumeMounts:
        - name: chat-data
          mountPath: /model
        - name: chat-data
          mountPath: /shared/logs
        resources:
          requests:
            cpu: "{{ .Values.chat.resources.requests.cpu }}"
            memory: "{{ .Values.chat.resources.requests.memory }}"
          limits:
            cpu: "{{ .Values.chat.resources.limits.cpu }}"
            memory: "{{ .Values.chat.resources.limits.memory }}"
      volumes:
      - name: chat-data
        persistentVolumeClaim:
          claimName: chat-pvc
